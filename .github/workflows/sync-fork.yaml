name: Sync Fork
on:
  schedule:
    - cron: '0 * * * *' # Runs hourly
  workflow_dispatch: {} # Allows manual triggering of the workflow

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for repository sync
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref_name }} # Checkout the branch to sync

      - name: Display Pre-Sync Commit Hash
        run: echo "Pre-sync commit hash: $(git rev-parse HEAD)"

      - name: Sync Fork with Upstream
        run: gh repo sync $REPOSITORY -b $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}

      - name: Display Post-Sync Commit Hash
        run: echo "Post-sync commit hash: $(git rev-parse HEAD)"
